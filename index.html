<!DOCTYPE html>
<html lang="en">
<head>
    <title>Melanoma Detection - Upload</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/font-awesome.min.css">
    <link rel="stylesheet" href="../static/css/aos.css">
    <link rel="stylesheet" href="../static/css/tooplate-gymso-styles.css">
</head>
<body data-spy="scroll" data-target="#navbarNav" data-offset="50">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Cutaneous Melanoma Detection</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-lg-auto">
                    <li class="nav-item"><a href="{{ url_for('first')}}" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="{{ url_for('login')}}" class="nav-link">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero d-flex flex-column justify-content-center align-items-center">
        <div class="bg-overlay"></div>
        <div class="container">
            <div class="row">
                <div class="col-lg-8 col-md-10 mx-auto col-12">
                    <div class="hero-text mt-5 text-center">
                        <h1 class="text-white">Melanoma Detection Using CNN</h1>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Image Upload Section -->
    <section class="contact section">
        <div class="container">
            <div class="row">
                <div class="col-md-8 mx-auto text-center">
                    <h2>Upload Image</h2>

                    {% if error %}
                        <p style="color: red;">{{ error }}</p>
                    {% endif %}

                    <form action="{{ url_for('index') }}" method="POST" enctype="multipart/form-data">
                        <div class="form-group">
                            <input type="file" name="imagefile" id="imagefile" class="form-control" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <div class="row">
                <div class="ml-auto col-lg-4 col-md-5"></div>
                <div class="d-flex justify-content-center mx-auto col-lg-5 col-md-7 col-12"></div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/js/bootstrap.min.js"></script>
    <script src="../static/js/aos.js"></script>
    <script src="../static/js/smoothscroll.js"></script>
    <script src="../static/js/custom.js"></script>

</body>
</html>
