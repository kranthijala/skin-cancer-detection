<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Melanoma Detection</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/font-awesome.min.css">
    <link rel="stylesheet" href="../static/css/aos.css">
    <link rel="stylesheet" href="../static/css/tooplate-gymso-styles.css">
</head>
<body data-spy="scroll" data-target="#navbarNav" data-offset="50">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Melanoma Detection</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero d-flex flex-column justify-content-center align-items-center" id="home">
        <div class="bg-overlay"></div>
        <div class="container">
            <div class="row">
                <div class="col-lg-8 col-md-10 mx-auto col-12">
                    <div class="hero-text mt-5 text-center">
                        <h1 class="text-white">Melanoma Detection Using CNN</h1>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Login Section -->
    <section class="contact section" id="contact">
        <div class="container">
            <div class="row">
                <div class="col-md-6 mx-auto text-center">
                    <h2>Login</h2>
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="form-group">
                            <label for="uname"><b>Username</b></label>
                            <input type="text" id="uname" name="uname" placeholder="Enter Username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="pwd"><b>Password</b></label>
                            <input type="password" id="pwd" name="pwd" placeholder="Enter Password" class="form-control" required>
                        </div>
                        {% if error %}
                            <p style="color: red;">{{ error }}</p>
                        {% endif %}
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/js/bootstrap.min.js"></script>
    <script src="../static/js/aos.js"></script>
    <script src="../static/js/smoothscroll.js"></script>
    <script src="../static/js/custom.js"></script>

</body>
</html>
