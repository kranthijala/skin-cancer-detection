<!DOCTYPE html>
<html lang="en">
<head>
    <title>Melanoma Detection Result</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/font-awesome.min.css">
    <link rel="stylesheet" href="../static/css/aos.css">
    <link rel="stylesheet" href="../static/css/tooplate-gymso-styles.css">
</head>
<body data-spy="scroll" data-target="#navbarNav" data-offset="50">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Melanoma Detection</a>
        </div>
    </nav>

    <!-- Result Section -->
    <section class="contact section">
        <div class="container">
            <div class="row">
                <div class="col-md-8 mx-auto text-center">
                    <h2>Melanoma Detection Result</h2>
                    {% if processed_file %}
                        <div class="card">
                            <div class="card-body">
                                <h3>Uploaded Image:</h3>
                                <img src="{{ processed_file }}" class="img-fluid" alt="Processed Image">
                                <h3>Prediction: {{ out_pred }}</h3>
                                <h4>Confidence: {{ out_prob }}</h4>
                            </div>
                        </div>
                    {% else %}
                        <p>No image uploaded. Please try again.</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/js/bootstrap.min.js"></script>
    <script src="../static/js/aos.js"></script>
    <script src="../static/js/custom.js"></script>
</body>
</html>
